<svg xmlns="http://www.w3.org/2000/svg" width="232" height="70" viewBox="0 0 232 70" role="img" aria-label="Ollama">
  <!-- Original, simple llama mark (placeholder — swap for an official ollama.png if desired).
       Explicit width/height give the SVG an intrinsic size so it never collapses in a flex row. -->
  <g fill="#0d0d0d">
    <!-- ears -->
    <path d="M44 12 L42 0 L51 9 Z" />
    <path d="M58 12 L62 0 L64 11 Z" />
    <!-- head -->
    <ellipse cx="53" cy="20" rx="10" ry="12" />
    <!-- snout -->
    <ellipse cx="61" cy="26" rx="6" ry="5" />
    <!-- neck -->
    <path d="M44 48 L38 24 L50 20 L57 46 Z" />
    <!-- body -->
    <ellipse cx="32" cy="45" rx="23" ry="14" />
    <!-- legs -->
    <rect x="16" y="51" width="6" height="16" rx="3" />
    <rect x="26" y="53" width="6" height="14" rx="3" />
    <rect x="38" y="53" width="6" height="14" rx="3" />
    <rect x="48" y="49" width="6" height="18" rx="3" />
  </g>
  <text x="84" y="46" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="600" fill="#0d0d0d">Ollama</text>
</svg>
